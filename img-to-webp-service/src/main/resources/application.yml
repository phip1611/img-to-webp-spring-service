spring:
  servlet:
    multipart:
      # keep this aligned with WebpConvertInput.MAX_FILE_SIZE
      max-request-size: 10MB
      max-file-size: 10MB


logging:
  level:
    de.phip1611: INFO

# Actuator is public. Only expose a minimal health check and never include
# details that could reveal configuration, request history, paths, or internals.
management:
  endpoints:
    web:
      discovery:
        enabled: false
      exposure:
        include: "health"
  endpoint:
    health:
      show-details: never
      show-components: never
    env:
      show-values: never
    configprops:
      show-values: never

# this runs behind a reverse proxy
# always resolve forwarded headers
server:
  forward-headers-strategy: native
  # accept requests from everywhere; make sure reverse proxy is securing this service
  address: "0.0.0.0"

# RateLimitConfiguration.java
rate-limit:
  rate-limit-requests-per-interval: 1000 # 1000 requests per hour
  rate-limit-interval-seconds: 3600 # 1 hour = 60 minutes = 3600 seconds
